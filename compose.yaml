services:
  db:
    # Imagen Postgres con la extensión pgvector preinstalada (búsqueda ANN).
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-notisnotis}
      POSTGRES_USER: ${POSTGRES_USER:-notisnotis}
      # PROD: define POSTGRES_PASSWORD en .env (no uses el valor de ejemplo).
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-notisnotis}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-notisnotis}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: ghcr.io/borborborja/notisnotis:latest
    build: .
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      # curl ya está instalado en la imagen; /accounts/login/ responde 200 sin auth.
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/accounts/login/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  # Refresco periódico del pipeline (sin daemon cron).
  scheduler:
    image: ghcr.io/borborborja/notisnotis:latest
    build: .
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          python manage.py run_pipeline || true
          sleep "${PIPELINE_INTERVAL:-300}"
        done
    restart: unless-stopped

  # Transcripción self-hosted (Whisper) para las "fuentes audio" (podcasts).
  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    environment:
      - ASR_MODEL=${ASR_MODEL:-base}
      - ASR_ENGINE=faster_whisper
    restart: unless-stopped

  # Buscador self-hosted para los "feeds con IA" (búsqueda web sin coste ni claves).
  searxng:
    image: searxng/searxng:latest
    env_file: .env
    environment:
      - SEARXNG_SECRET=${SEARXNG_SECRET:-change-me-searxng-secret}
      - SEARXNG_BASE_URL=http://searxng:8080/
    volumes:
      - ./searxng:/etc/searxng:rw
    restart: unless-stopped

  # Servidor MCP por HTTP/SSE (opcional). Define NOTISNOTIS_API_TOKEN en .env.
  mcp:
    image: ghcr.io/borborborja/notisnotis:latest
    build: .
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["python", "manage.py", "run_mcp", "--http", "--port", "8765"]
    ports:
      - "8765:8765"
    restart: unless-stopped
    profiles: ["mcp"]

volumes:
  pgdata:
