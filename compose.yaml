services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: notisnotis
      POSTGRES_USER: notisnotis
      POSTGRES_PASSWORD: notisnotis
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notisnotis"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: ghcr.io/borborborja/notisnotis:latest
    build: .
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

  # Refresco periódico del pipeline (sin daemon cron).
  scheduler:
    image: ghcr.io/borborborja/notisnotis:latest
    build: .
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          python manage.py run_pipeline || true
          sleep "${PIPELINE_INTERVAL:-300}"
        done
    restart: unless-stopped

  # Servidor MCP por HTTP/SSE (opcional). Define NOTISNOTIS_API_TOKEN en .env.
  mcp:
    image: ghcr.io/borborborja/notisnotis:latest
    build: .
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["python", "manage.py", "run_mcp", "--http", "--port", "8765"]
    ports:
      - "8765:8765"
    restart: unless-stopped
    profiles: ["mcp"]

volumes:
  pgdata:
